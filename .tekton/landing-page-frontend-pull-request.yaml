apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/RedHatInsights/landing-page-frontend?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/pull_request_number: '{{pull_request_number}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-cel-expression: event == "pull_request" && target_branch
      == "master"
    # UPDATED: Changed to use E2E pipeline with Playwright tests
    pipelinesascode.tekton.dev/pipeline: https://github.com/RedHatInsights/konflux-pipelines/raw/main/pipelines/platform-ui/docker-build-run-all-tests.yaml
  creationTimestamp: null
  labels:
    appstudio.openshift.io/application: landing-page-frontend
    appstudio.openshift.io/component: landing-page-frontend
    pipelines.appstudio.openshift.io/type: build
  name: landing-page-frontend-on-pull-request
  namespace: rh-platform-experien-tenant
spec:
  params:
  # Existing parameters - preserved from original
  - name: git-url
    value: '{{source_url}}'
  - name: revision
    value: '{{revision}}'
  - name: output-image
    value: quay.io/redhat-user-workloads/rh-platform-experien-tenant/landing-page-frontend/landing-page-frontend:on-pr-{{revision}}
  - name: image-expires-after
    value: 5d
  - name: dockerfile
    value: build-tools/Dockerfile

  # E2E Testing Parameters
  - name: test-app-name
    value: "landing-page-frontend"

  - name: test-app-port
    value: "8000"

  # CRITICAL: Playwright image version must match @playwright/test version in package.json
  # If package.json has "@playwright/test": "^1.40.0", use v1.40.0-jammy
  # If package.json has "@playwright/test": "^1.45.0", use v1.45.0-jammy
  - name: playwright-image
    value: "mcr.microsoft.com/playwright:v1.40.0-jammy"

  - name: run-app-script
    value: |
      #!/bin/bash
      set -ex
      # Start Caddy to serve app assets on port 8000
      caddy run --config /etc/caddy/Caddyfile --adapter caddyfile

  - name: frontend-proxy-routes-configmap
    value: "landing-page-frontend-dev-proxy-caddyfile"

  - name: e2e-tests-script
    value: |
      #!/bin/bash
      set -ex
      # Dependencies are installed during workspace setup
      # This script only needs to run the tests
      npx playwright test

  - name: e2e-credentials-secret
    value: "landing-page-frontend-credentials-secret"

  # UPDATED: Changed pipelineRef to use docker-build-run-all-tests
  pipelineRef:
    resolver: git
    params:
      - name: url
        value: https://github.com/RedHatInsights/konflux-pipelines
      - name: revision
        value: main
      - name: pathInRepo
        value: pipelines/platform-ui/docker-build-run-all-tests.yaml

  taskRunTemplate:
    serviceAccountName: build-pipeline-landing-page-frontend
  workspaces:
  - name: workspace
    volumeClaimTemplate:
      metadata:
        creationTimestamp: null
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
      status: {}
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
status: {}
